<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 繪圖提示詞生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 自訂一些捲動軸樣式使其更美觀 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen">

    <div class="max-w-3xl mx-auto p-4 sm:p-6 lg:p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl sm:text-4xl font-bold text-slate-900 mb-2">
                <i class="fa-solid fa-wand-magic-sparkles text-blue-500 mr-2"></i>AI 繪圖提示詞生成器
            </h1>
            <p class="text-slate-500 text-sm sm:text-base">輸入簡單的想法，讓 AI 幫你擴充成專業的 Midjourney / Stable Diffusion 中英對照咒語！</p>
        </header>

        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
            <div class="flex items-center mb-3">
                <i class="fa-solid fa-key text-amber-500 mr-2"></i>
                <h2 class="text-lg font-semibold text-slate-800">1. API Key 與 模型設定</h2>
            </div>
            <p class="text-xs text-slate-500 mb-3">請輸入您的 Google Gemini API Key。此金鑰僅會在您的瀏覽器中執行，不會被儲存或傳送至第三方伺服器。</p>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="relative md:col-span-2">
                    <input type="password" id="apiKeyInput" placeholder="AIzaSy..." 
                        class="w-full pl-4 pr-10 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    <button type="button" id="togglePassword" class="absolute right-3 top-2.5 text-slate-400 hover:text-slate-600" onclick="toggleApiKeyVisibility()">
                        <i class="fa-solid fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
                <div class="md:col-span-1">
                    <select id="modelSelect" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white text-slate-700 text-sm">
                        <option value="gemini-pro">Gemini Pro (最穩定救急用)</option>
                        <option value="gemini-2.5-flash">Gemini 2.5 Flash (最新/最快)</option>
                        <option value="gemini-2.0-flash" selected>Gemini 2.0 Flash (推薦/穩定)</option>
                        <option value="gemini-1.5-pro-latest">Gemini 1.5 Pro (進階/備用)</option>
                        <option value="gemini-1.5-flash-latest">Gemini 1.5 Flash (舊版/備用)</option>
                    </select>
                </div>
            </div>

            <div class="mt-3 flex items-center">
                <input type="checkbox" id="saveKeyCheck" class="mr-2 rounded border-slate-300 text-blue-600 focus:ring-blue-500" onchange="toggleSaveKey()">
                <label for="saveKeyCheck" class="text-sm text-slate-600 cursor-pointer">在瀏覽器記住我的 API Key 與選擇</label>
            </div>
        </section>

        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-5 mb-6">
            <div class="flex items-center mb-3">
                <i class="fa-solid fa-pen-nib text-indigo-500 mr-2"></i>
                <h2 class="text-lg font-semibold text-slate-800">2. 描述你的畫面</h2>
            </div>
            <textarea id="userInput" rows="3" placeholder="例如：一隻戴著太空頭盔的橘貓，正在火星上喝咖啡..." 
                class="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all resize-none"></textarea>
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">畫風 (Style)</label>
                    <select id="styleSelect" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white text-slate-700">
                        <option value="寫實攝影 (Photorealistic)">寫實攝影 (Photorealistic)</option>
                        <option value="動漫風格 (Anime Style)">動漫風格 (Anime Style)</option>
                        <option value="日本少女漫畫風格 (Japanese Shoujo Manga Style, delicate lines, emotional)">日本少女漫畫 (Japanese Shoujo Manga)</option>
                        <option value="日本少年漫畫風格 (Japanese Shounen Manga Style, dynamic action, sharp ink)">日本少年漫畫 (Japanese Shounen Manga)</option>
                        <option value="賽博龐克 (Cyberpunk)">賽博龐克 (Cyberpunk)</option>
                        <option value="水彩畫 (Watercolor)">水彩畫 (Watercolor)</option>
                        <option value="3D 動畫 (3D Animation)">3D 動畫 (3D Animation)</option>
                        <option value="油畫 (Oil Painting)">油畫 (Oil Painting)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">光影 (Lighting)</label>
                    <select id="lightingSelect" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white text-slate-700">
                        <option value="電影光 (Cinematic Lighting)">電影光 (Cinematic Lighting)</option>
                        <option value="自然光 (Natural Light)">自然光 (Natural Light)</option>
                        <option value="霓虹燈 (Neon Lights)">霓虹燈 (Neon Lights)</option>
                        <option value="黃金時刻 (Golden Hour)">黃金時刻 (Golden Hour)</option>
                        <option value="棚拍打光 (Studio Lighting)">棚拍打光 (Studio Lighting)</option>
                    </select>
                </div>
            </div>

            <button id="generateBtn" onclick="generatePrompt()" 
                class="w-full mt-5 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors flex items-center justify-center gap-2">
                <i class="fa-solid fa-bolt"></i>
                生成專業提示詞
            </button>
        </section>

        <div id="errorMessage" class="hidden bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-6 flex items-start gap-2">
            <i class="fa-solid fa-circle-exclamation flex-shrink-0 mt-0.5"></i>
            <span id="errorText" class="text-sm">發生錯誤。</span>
        </div>

        <section id="resultSection" class="hidden bg-white rounded-xl shadow-sm border border-slate-200 p-5">
            <div class="flex items-center justify-between mb-4 border-b border-slate-100 pb-3">
                <div class="flex items-center">
                    <i class="fa-solid fa-clipboard-check text-green-500 mr-2"></i>
                    <h2 class="text-lg font-semibold text-slate-800">3. 生成結果 (中英對照)</h2>
                </div>
                <button onclick="copyToClipboard()" class="text-sm text-blue-600 hover:text-blue-800 flex items-center gap-1 transition-colors bg-blue-50 px-3 py-1.5 rounded-md hover:bg-blue-100">
                    <i class="fa-regular fa-copy"></i>
                    <span id="copyBtnText">全部複製</span>
                </button>
            </div>
            
            <div id="loadingIndicator" class="hidden py-8 flex flex-col items-center justify-center text-slate-500">
                <div class="loader mb-3"></div>
                <p id="loadingText">AI 正在施展魔法擴充提示詞中...</p>
            </div>

            <div id="outputContent" class="text-slate-700 whitespace-pre-wrap leading-relaxed text-sm sm:text-base font-mono bg-slate-50 p-4 rounded-lg border border-slate-200">
                </div>
        </section>
        
        <footer class="mt-8 text-center text-slate-400 text-xs">
            <p>Powered by Google Gemini API &bull; 專為 AI 繪圖設計</p>
        </footer>
    </div>

    <script>
        // 初始化：檢查是否存有 API Key 和模型選擇
        document.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            const savedModel = localStorage.getItem('gemini_model');
            
            if (savedKey) {
                document.getElementById('apiKeyInput').value = savedKey;
                document.getElementById('saveKeyCheck').checked = true;
            }
            if (savedModel) {
                document.getElementById('modelSelect').value = savedModel;
            }
        });

        // 切換密碼顯示/隱藏
        function toggleApiKeyVisibility() {
            const input = document.getElementById('apiKeyInput');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // 儲存或移除 API Key
        function toggleSaveKey() {
            const isChecked = document.getElementById('saveKeyCheck').checked;
            const apiKey = document.getElementById('apiKeyInput').value;
            const model = document.getElementById('modelSelect').value;
            
            if (isChecked && apiKey) {
                localStorage.setItem('gemini_api_key', apiKey);
                localStorage.setItem('gemini_model', model);
            } else {
                localStorage.removeItem('gemini_api_key');
                localStorage.removeItem('gemini_model');
            }
        }

        // 顯示錯誤訊息 UI
        function showError(msg) {
            const errorDiv = document.getElementById('errorMessage');
            document.getElementById('errorText').innerHTML = msg; 
            errorDiv.classList.remove('hidden');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }

        // 暫停函式 (用於自動重試機制)
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        // 呼叫 Gemini API 產生提示詞
        async function generatePrompt() {
            hideError();
            
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            const selectedModel = document.getElementById('modelSelect').value;
            const userInput = document.getElementById('userInput').value.trim();
            const style = document.getElementById('styleSelect').value;
            const lighting = document.getElementById('lightingSelect').value;

            if (!apiKey) {
                showError('請先輸入 Google Gemini API Key。');
                document.getElementById('apiKeyInput').focus();
                return;
            }

            if (!userInput) {
                showError('請輸入您想要繪製的畫面描述。');
                document.getElementById('userInput').focus();
                return;
            }

            // 更新儲存的金鑰（如果使用者有勾選）
            if (document.getElementById('saveKeyCheck').checked) {
                localStorage.setItem('gemini_api_key', apiKey);
                localStorage.setItem('gemini_model', selectedModel);
            }

            // UI 狀態切換：顯示載入中
            const resultSection = document.getElementById('resultSection');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const loadingText = document.getElementById('loadingText');
            const outputContent = document.getElementById('outputContent');
            const generateBtn = document.getElementById('generateBtn');

            resultSection.classList.remove('hidden');
            loadingIndicator.classList.remove('hidden');
            outputContent.classList.add('hidden');
            loadingText.textContent = 'AI 正在施展魔法擴充提示詞中...';
            
            // 停用按鈕避免重複點擊
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<div class="loader !w-4 !h-4 !border-2"></div> 生成中...';
            generateBtn.classList.add('opacity-75', 'cursor-not-allowed');

            try {
                // 修改後的 System Instruction，要求中英對照
                const systemInstruction = `你是一個專業的 AI 繪圖（Midjourney, Stable Diffusion）提示詞工程師。
你的任務是將用戶的簡單中文描述，擴充成 3 個不同層次、詳細且高品質的繪圖提示詞。
每個選項必須包含「英文提示詞」與「中文翻譯」，方便使用者理解。英文提示詞需包含：主體細節、背景環境、指定畫風、指定光影、以及提升畫質的常見關鍵字。

請嚴格以以下的 Markdown 格式輸出，不要有多餘的廢話：

### Option 1: Basic & Clear
**【英文咒語】**
[英文提示詞 1]
**【中文翻譯】**
[中文翻譯 1]

### Option 2: Highly Detailed & Dramatic
**【英文咒語】**
[英文提示詞 2]
**【中文翻譯】**
[中文翻譯 2]

### Option 3: Artistic Interpretation
**【英文咒語】**
[英文提示詞 3]
**【中文翻譯】**
[中文翻譯 3]`;

                const userPrompt = `用戶描述：${userInput}\n指定畫風：${style}\n指定光影：${lighting}`;
                
                // 動態決定 API 版本 (gemini-pro 通常在 v1 最穩)
                const apiVersion = selectedModel === 'gemini-pro' ? 'v1' : 'v1beta';
                const apiUrl = `https://generativelanguage.googleapis.com/${apiVersion}/models/${selectedModel}:generateContent?key=${apiKey}`;
                
                // 針對 gemini-pro 的 payload 做相容性調整
                let requestBody;
                if (selectedModel === 'gemini-pro') {
                    requestBody = {
                        contents: [{ parts: [{ text: systemInstruction + "\n\n用戶要求：\n" + userPrompt }] }],
                        generationConfig: { temperature: 0.7 }
                    };
                } else {
                    requestBody = {
                        systemInstruction: { parts: [{ text: systemInstruction }] },
                        contents: [{ parts: [{ text: userPrompt }] }],
                        generationConfig: { temperature: 0.7 }
                    };
                }

                // 自動重試機制 (最多重試 3 次)
                let maxRetries = 3;
                let currentTry = 0;
                let data;

                while (currentTry < maxRetries) {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(requestBody)
                    });

                    data = await response.json();

                    // 如果成功，跳出迴圈
                    if (response.ok) {
                        break;
                    }

                    // 處理 404 (模型找不到)
                    if (response.status === 404) {
                        throw new Error(`找不到模型 <b>${selectedModel}</b>。<br>請在上方選單選擇其他的模型試試看。`);
                    }

                    // 處理額度耗盡 (Quota Exceeded) 的 429 錯誤，不進行重試
                    if (response.status === 429 && data.error?.message?.toLowerCase().includes('quota')) {
                        throw new Error(`<b>API 金鑰額度受限 (Quota Exceeded)</b>。<br>您的 API Key 額度不足或被限制 (Limit: 0)，通常是因為：<br>1. 該帳號的免費額度已耗盡<br>2. Google 要求該專案綁定帳單才能開通免費額度<br><br>💡 <b>解決方法：</b>建議前往 <a href="https://aistudio.google.com/" target="_blank" class="underline text-blue-600 hover:text-blue-800">Google AI Studio</a> 換一個 Google 帳號申請新金鑰。`);
                    }

                    // 如果遇到 503(伺服器忙碌) 或 一般的 429(請求太頻繁)，則等待後重試
                    if (response.status === 503 || response.status === 429) {
                        currentTry++;
                        if (currentTry >= maxRetries) {
                            throw new Error(`嘗試 ${maxRetries} 次後伺服器依然忙碌 (High demand)。<br>💡 <b>建議：請在上方選單切換至「Gemini Pro (最穩定救急用)」再試一次。</b>`);
                        }
                        
                        // 更新介面提示使用者正在重試
                        const delay = 2000 * currentTry; 
                        loadingText.textContent = `伺服器塞車中，正在進行第 ${currentTry} 次重試...`;
                        generateBtn.innerHTML = `<div class="loader !w-4 !h-4 !border-2"></div> 重試中 (${currentTry}/${maxRetries})...`;
                        
                        await sleep(delay);
                    } else {
                        // 其他錯誤直接拋出
                        throw new Error(data.error?.message || 'API 請求失敗，請檢查 API Key 是否正確。');
                    }
                }

                // 解析並顯示結果
                const generatedText = data.candidates[0].content.parts[0].text;
                outputContent.textContent = generatedText;

                // 顯示結果區塊
                loadingIndicator.classList.add('hidden');
                outputContent.classList.remove('hidden');

            } catch (error) {
                console.error('Error:', error);
                showError(error.message);
                resultSection.classList.add('hidden');
            } finally {
                // 恢復按鈕狀態
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<i class="fa-solid fa-bolt"></i> 生成專業提示詞';
                generateBtn.classList.remove('opacity-75', 'cursor-not-allowed');
            }
        }

        // 複製到剪貼簿功能
        function copyToClipboard() {
            const outputText = document.getElementById('outputContent').textContent;
            if (!outputText) return;

            const textArea = document.createElement("textarea");
            textArea.value = outputText;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                const copyBtnText = document.getElementById('copyBtnText');
                const originalText = copyBtnText.textContent;
                copyBtnText.textContent = '已複製！';
                
                setTimeout(() => {
                    copyBtnText.textContent = originalText;
                }, 2000);
            } catch (err) {
                console.error('複製失敗', err);
                showError('無法複製到剪貼簿，請手動選取複製。');
            } finally {
                document.body.removeChild(textArea);
            }
        }
    </script>
</body>
</html>
